name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.0"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Lint & Type Check
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy type check
        run: uv run mypy core/ api/

  # ───────────────────────────────────────────────────────────────────────────
  # Unit Tests
  # ───────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        env:
          APP_ENV: testing
          APP_SECRET_KEY: "ci-test-secret-key-must-be-32-chars-long"
          JWT_SECRET_KEY: "ci-test-jwt-key-must-be-32-chars-longg"
          GEMINI_API_KEY: "ci-test-key"
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: |
          uv run pytest tests/unit/ -v \
            --tb=short \
            -m unit \
            --cov=core \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────────────
  # Integration Tests (requires PostgreSQL)
  # ───────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: outur
          POSTGRES_PASSWORD: outur_pass
          POSTGRES_DB: outur_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U outur -d outur_ai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://outur:outur_pass@localhost:5432/outur_ai_test"
        run: uv run alembic upgrade head

      - name: Run integration tests
        env:
          APP_ENV: testing
          APP_SECRET_KEY: "ci-test-secret-key-must-be-32-chars-long"
          JWT_SECRET_KEY: "ci-test-jwt-key-must-be-32-chars-longg"
          GEMINI_API_KEY: "ci-test-key"
          DATABASE_URL: "postgresql+asyncpg://outur:outur_pass@localhost:5432/outur_ai_test"
        run: |
          uv run pytest tests/integration/ -v \
            --tb=short \
            -m integration

  # ───────────────────────────────────────────────────────────────────────────
  # Security Scan
  # ───────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Bandit security scan
        run: uv run bandit -r core/ api/ -c pyproject.toml

      - name: Check for dependency vulnerabilities
        run: uv pip audit

  # ───────────────────────────────────────────────────────────────────────────
  # Docker Build Validation
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: outur-ai:ci
