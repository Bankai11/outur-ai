# Alembic configuration for Outur AI
# ─────────────────────────────────────────────────────────────────────────────
# This file is used by the `alembic` CLI to manage database migrations.
# The actual database URL is read dynamically from the application settings
# in alembic/env.py — do NOT hardcode credentials here.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts
script_location = alembic

# File format for new migration scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration filenames
timezone = UTC

# Truncate slug to this length
truncate_slug_length = 40

# Whether to log the SQL statements executed
# Set to true for debugging migrations
sqlalchemy.echo = false

[post_write_hooks]
# Automatically format migration files with ruff after generation
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
